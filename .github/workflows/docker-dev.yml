concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
jobs:
  guard:
    if: github.repository == 'TLCFEM/suanPan'
    runs-on: ubuntu-slim
    steps:
      - run: echo "Hello, World!"
  linux-combine:
    needs:
      - linux-dev
    runs-on: ubuntu-latest
    steps:
      - name: Login Docker
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Login GitHub
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Combine
        run: |
          docker buildx imagetools create -t tlcfem/suanpan:latest tlcfem/suanpan:dev-amd64 tlcfem/suanpan:dev-arm64
          docker buildx imagetools create -t ghcr.io/tlcfem/suanpan:latest tlcfem/suanpan:latest
          JWT=$(curl -s -H "Content-Type: application/json" -X POST -d "{\"username\": \"${{ secrets.DOCKERHUB_USERNAME }}\", \"password\": \"${{ secrets.DOCKERHUB_TOKEN }}\"}" https://hub.docker.com/v2/users/login/ | jq -r .token)
          curl -X DELETE -H "Authorization: JWT $JWT" https://hub.docker.com/v2/repositories/tlcfem/suanpan/tags/dev-amd64/
          curl -X DELETE -H "Authorization: JWT $JWT" https://hub.docker.com/v2/repositories/tlcfem/suanpan/tags/dev-arm64/
  linux-dev:
    needs: guard
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Clone
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Login Docker
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Login GitHub
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Script/${{ matrix.arch }}/Rocky.Dockerfile
          provenance: false
          push: true
          tags: tlcfem/suanpan:dev-${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    timeout-minutes: 1200
name: Docker Latest
'on':
  schedule:
    - cron: 0 8 * * 4
  workflow_dispatch: null
permissions:
  contents: read
  packages: write
