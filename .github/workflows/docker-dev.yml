concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
jobs:
  guard:
    if: github.repository == 'TLCFEM/suanPan'
    runs-on: ubuntu-slim
    steps:
      - run: echo "Hello, World!"
  linux-amd64:
    needs: guard
    runs-on: ubuntu-24.04
    steps:
      - name: Clone
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Login Docker
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Login GitHub
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Script/amd64/Rocky.Dockerfile
          provenance: false
          push: true
          tags: |
            tlcfem/suanpan:amd64
            ghcr.io/tlcfem/suanpan:latest
    timeout-minutes: 1200
  linux-arm64:
    needs: guard
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Clone
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Login Docker
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Login GitHub
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Script/arm64/Rocky.Dockerfile
          platforms: linux/arm64
          provenance: false
          push: true
          tags: |
            tlcfem/suanpan:arm64
    timeout-minutes: 1200
  linux-combine:
    needs:
      - linux-amd64
      - linux-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Login Docker
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Combine
        run: docker buildx imagetools create -t tlcfem/suanpan:latest tlcfem/suanpan:amd64 tlcfem/suanpan:arm64
  linux-mpi-amd64:
    needs: guard
    runs-on: ubuntu-24.04
    steps:
      - name: Clone
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Login Docker
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Login GitHub
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Script/amd64/Rocky.MPI.Dockerfile
          provenance: false
          push: true
          tags: |
            tlcfem/suanpan:mpi-amd64
            ghcr.io/tlcfem/suanpan:mpi-latest
    timeout-minutes: 1200
name: Docker Latest
'on':
  schedule:
    - cron: 0 8 * * 4
  workflow_dispatch: null
