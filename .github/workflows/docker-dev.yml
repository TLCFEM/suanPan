name: Docker Latest
on:
  schedule:
    - cron: "0 8 * * 4"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  linux-amd64:
    runs-on: ubuntu-24.04
    timeout-minutes: 1200
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Login Docker
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login GitHub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Script/amd64/Rocky.Dockerfile
          provenance: false
          push: true
          tags: |
            tlcfem/suanpan:amd64
            ghcr.io/tlcfem/suanpan:latest
  linux-mpi-amd64:
    runs-on: ubuntu-24.04
    timeout-minutes: 1200
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Login Docker
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login GitHub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Script/amd64/Rocky.MPI.Dockerfile
          provenance: false
          push: true
          tags: |
            tlcfem/suanpan:mpi-amd64
            ghcr.io/tlcfem/suanpan:mpi-latest
  linux-arm64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 1200
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Login Docker
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login GitHub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Script/arm64/Rocky.Dockerfile
          platforms: linux/arm64
          provenance: false
          push: true
          tags: |
            tlcfem/suanpan:arm64
  linux-combine:
    needs: [linux-amd64, linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Login Docker
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Combine
        run: docker buildx imagetools create -t tlcfem/suanpan:latest tlcfem/suanpan:amd64 tlcfem/suanpan:arm64
