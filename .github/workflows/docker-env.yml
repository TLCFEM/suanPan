concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
jobs:
  guard:
    if: github.repository == 'TLCFEM/suanPan'
    runs-on: ubuntu-slim
    steps:
      - run: echo "Hello, World!"
  ide-image-base:
    needs: guard
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    steps:
      - name: Clone
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Login
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Base ${{ matrix.arch }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Script/${{ matrix.arch }}/Rocky.Pre.Dockerfile
          platforms: linux/${{ matrix.arch }}
          provenance: false
          push: true
          tags: tlcfem/suanpan-env:${{ matrix.arch }}
    strategy:
      matrix:
        arch:
          - amd64
          - arm64
    timeout-minutes: 3000
  ide-image-combine:
    needs: ide-image-base
    runs-on: ubuntu-24.04
    steps:
      - name: Login
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Combine
        run: docker buildx imagetools create -t tlcfem/suanpan-env:latest tlcfem/suanpan-env:amd64 tlcfem/suanpan-env:arm64
  ide-image-cuda:
    needs: guard
    runs-on: ubuntu-24.04
    steps:
      - name: Clone
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Login
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: CUDA
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Script/amd64/Rocky.Pre.CUDA.Dockerfile
          push: true
          tags: tlcfem/suanpan-env:cuda
    timeout-minutes: 3000
name: Docker Base Image
'on':
  schedule:
    - cron: 30 5 1 * *
  workflow_dispatch: null
