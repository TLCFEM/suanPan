name: Docker Base Image
on:
  schedule:
    - cron: "30 5 1 * *"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ide-image-base:
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    timeout-minutes: 3000
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Base ${{ matrix.arch }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Script/${{ matrix.arch }}/Rocky.Pre.Dockerfile
          platforms: linux/${{ matrix.arch }}
          provenance: false
          push: true
          tags: tlcfem/suanpan-env:${{ matrix.arch }}
  ide-image-combine:
    needs: ide-image-base
    runs-on: ubuntu-24.04
    steps:
      - name: Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Combine
        run: docker buildx imagetools create -t tlcfem/suanpan-env:latest tlcfem/suanpan-env:amd64 tlcfem/suanpan-env:arm64
  ide-image-cuda:
    runs-on: ubuntu-24.04
    timeout-minutes: 3000
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: CUDA
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Script/amd64/Rocky.Pre.CUDA.Dockerfile
          push: true
          tags: tlcfem/suanpan-env:cuda
