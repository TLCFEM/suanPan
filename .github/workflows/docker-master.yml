name: Docker Stable
on:
  push:
    branches: [master]
jobs:
  linux-base:
    if: ${{ !contains(github.event.head_commit.message, '[skip.all]') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 600
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: QEMU
        if: ${{ matrix.arch == 'arm64' }}
        uses: docker/setup-qemu-action@v4
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Base ${{ matrix.arch }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Script/${{ matrix.arch }}/Rocky.Dockerfile
          platforms: linux/${{ matrix.arch }}
          provenance: false
          push: true
          tags: tlcfem/suanpan:stable-${{ matrix.arch }}
  linux-combine:
    needs: linux-base
    runs-on: ubuntu-24.04
    steps:
      - name: Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Combine
        run: docker buildx imagetools create -t tlcfem/suanpan:stable tlcfem/suanpan:stable-amd64 tlcfem/suanpan:stable-arm64
