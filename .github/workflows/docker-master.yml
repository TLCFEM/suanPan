jobs:
  guard:
    if: github.repository == 'TLCFEM/suanPan'
    runs-on: ubuntu-slim
    steps:
      - run: echo "Hello, World!"
  linux-base:
    if: ${{ !contains(github.event.head_commit.message, '[skip.all]') }}
    needs: guard
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Login
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Base ${{ matrix.arch }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Script/${{ matrix.arch }}/Rocky.Dockerfile
          platforms: linux/${{ matrix.arch }}
          provenance: false
          push: true
          tags: tlcfem/suanpan:stable-${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    timeout-minutes: 600
  linux-combine:
    needs: linux-base
    runs-on: ubuntu-24.04
    steps:
      - name: Login
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Combine
        run: docker buildx imagetools create -t tlcfem/suanpan:stable tlcfem/suanpan:stable-amd64 tlcfem/suanpan:stable-arm64
name: Docker Stable
'on':
  push:
    branches:
      - master
