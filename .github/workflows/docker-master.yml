env:
  version: 4.2.0
jobs:
  guard:
    if: github.repository == 'TLCFEM/suanPan'
    runs-on: ubuntu-slim
    steps:
      - run: echo "Hello, World!"
  linux-base:
    if: ${{ !contains(github.event.head_commit.message, '[skip.all]') }}
    needs: guard
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Clone
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Login
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Base ${{ matrix.arch }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Script/${{ matrix.arch }}/Rocky.Dockerfile
          platforms: linux/${{ matrix.arch }}
          provenance: false
          push: true
          tags: tlcfem/suanpan:${{ env.version }}-${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    timeout-minutes: 600
  linux-combine:
    needs: linux-base
    runs-on: ubuntu-24.04
    steps:
      - name: Login Docker
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Login GitHub
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Combine
        run: |
          docker buildx imagetools create -t tlcfem/suanpan:${{ env.version }} tlcfem/suanpan:${{ env.version }}-amd64 tlcfem/suanpan:${{ env.version }}-arm64
          docker buildx imagetools create -t ghcr.io/tlcfem/suanpan:${{ env.version }} tlcfem/suanpan:${{ env.version }}
          JWT=$(curl -s -H "Content-Type: application/json" -X POST -d "{\"username\": \"${{ secrets.DOCKERHUB_USERNAME }}\", \"password\": \"${{ secrets.DOCKERHUB_TOKEN }}\"}" https://hub.docker.com/v2/users/login/ | jq -r .token)
          curl -X DELETE -H "Authorization: JWT $JWT" https://hub.docker.com/v2/repositories/tlcfem/suanpan/tags/${{ env.version }}-amd64/
          curl -X DELETE -H "Authorization: JWT $JWT" https://hub.docker.com/v2/repositories/tlcfem/suanpan/tags/${{ env.version }}-arm64/
name: Docker Stable
'on':
  push:
    branches:
      - master
