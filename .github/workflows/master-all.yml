name: Stable
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
env:
  SP_TIME: ""
  ARTIFACT: ""
permissions:
  id-token: write
jobs:
  linux-master:
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm]
        avx: [ON, OFF]
        vtk: [ON, OFF]
        mkl: [ON, OFF]
        aocl: [ON, OFF]
        exclude:
          - mkl: ON
            aocl: ON
          - os: ubuntu-22.04-arm
            avx: ON
          - os: ubuntu-22.04-arm
            mkl: ON
          - os: ubuntu-22.04-arm
            aocl: ON
    steps:
      - name: Clone
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Golang
        uses: actions/setup-go@v6
        with:
          cache: false
      - name: Prepare
        run: |
          echo "SP_TIME=daily-$(date +''%y%m%d'')" >> $GITHUB_ENV
      - name: MKL
        if: matrix.mkl == 'ON'
        run: |
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update && sudo apt-get install intel-oneapi-mkl-devel
      - name: Compile
        run: |
          sudo apt-get update && sudo apt-get install libglvnd-dev dpkg-dev xz-utils patchelf
          go build Checker/updater.go
          ./Script/linux-dependency.sh ${{ matrix.os }}
          mkdir build && cd build
          cmake \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=dist \
          -DSP_BUILD_PARALLEL=ON \
          -DSP_ENABLE_AOCL=${{ matrix.aocl }} \
          -DSP_ENABLE_AVX2=${{ matrix.avx }} \
          -DSP_ENABLE_IOMP=OFF \
          -DSP_ENABLE_MKL=${{ matrix.mkl }} \
          -DSP_ENABLE_SHARED_MKL=OFF \
          -DSP_ENABLE_VTK=${{ matrix.vtk }} \
          -DVTK_PATH=/home/runner/work/suanPan/suanPan/lib/cmake/vtk-9.5/ \
          ..
          cmake --build . --target install --config Release -j $(nproc)
          cmake --build . --target package
          cd ..
          ./Script/linux-patcher.sh ./build/dist/bin/suanPan
          cp updater build/dist/bin
      - name: Cosign
        uses: sigstore/gh-action-sigstore-python@v3.0.1
        with:
          inputs: build/dist/bin/*
      - name: Pack
        run: |
          file_name="suanPan-linux"
          file_name+=$([[ "${{ matrix.os }}" != *"arm"* ]] && echo "-amd64" || echo "-arm64")
          if [ "${{ matrix.mkl }}" == "ON" ]; then
            file_name+="-mkl"
          elif [ "${{ matrix.aocl }}" == "ON" ]; then
            file_name+="-aocl"
          else
            file_name+="-openblas"
          fi
          [[ "${{ matrix.vtk }}" == "ON" ]] && file_name+="-vtk"
          if [[ "${{ matrix.os }}" != *"arm"* ]]; then
            file_name+=$([[ "${{ matrix.avx }}" == "ON" ]] && echo "-avx" || echo "-no-avx")
          fi
          file_name+=".tar.gz"
          echo "ARTIFACT=$file_name" >> "$GITHUB_ENV"
          tar czf $file_name -C build/dist .
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}
      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.ARTIFACT }}
          asset_name: ${{ env.ARTIFACT }}
          tag: ${{ env.SP_TIME }}
          prerelease: true
          overwrite: true
          body: |
            This release is automatically generated by CI/CD pipelines.
  linux-master-mpi:
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-22.04]
    steps:
      - name: Clone
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Golang
        uses: actions/setup-go@v6
        with:
          cache: false
      - name: Prepare
        run: |
          echo "SP_TIME=daily-$(date +''%y%m%d'')" >> $GITHUB_ENV
      - name: VTK
        run: |
          wget -q https://github.com/TLCFEM/prebuilds/releases/download/latest/VTK-9.5.2-${{ matrix.os }}.tar.gz
          tar xf VTK-9.5.2-${{ matrix.os }}.tar.gz
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update && sudo apt-get install intel-oneapi-mkl-devel intel-oneapi-mpi-devel libglvnd-dev dpkg-dev xz-utils patchelf
      - name: Compile
        run: |
          go build Checker/updater.go
          mkdir build && cd build
          source /opt/intel/oneapi/setvars.sh
          cmake \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DCMAKE_INSTALL_PREFIX=dist \
          -DSP_BUILD_PARALLEL=ON \
          -DSP_ENABLE_64BIT_INDEXING=ON \
          -DSP_ENABLE_AVX2=OFF \
          -DSP_ENABLE_IOMP=OFF \
          -DSP_ENABLE_MKL=ON \
          -DSP_ENABLE_MPI=ON \
          -DSP_ENABLE_SHARED_MKL=OFF \
          -DSP_ENABLE_VTK=ON \
          -DVTK_PATH=/home/runner/work/suanPan/suanPan/lib/cmake/vtk-9.5/ \
          ..
          cmake --build . --target install --config Release -j $(nproc)
          cmake --build . --target package
          cd ..
          ./Script/linux-patcher.sh ./build/dist/bin/suanPan
          cp updater build/dist/bin
      - name: Cosign
        uses: sigstore/gh-action-sigstore-python@v3.0.1
        with:
          inputs: build/dist/bin/*
      - name: Pack
        run: |
          file_name="suanPan-linux-amd64-mkl-vtk-mpi-no-avx-ilp64.tar.gz"
          echo "ARTIFACT=$file_name" >> "$GITHUB_ENV"
          tar czf $file_name -C build/dist .
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}
      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.ARTIFACT }}
          asset_name: ${{ env.ARTIFACT }}
          tag: ${{ env.SP_TIME }}
          prerelease: true
          overwrite: true
          body: |
            This release is automatically generated by CI/CD pipelines.
  macos-master:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 100
    strategy:
      matrix:
        os: [macos-14-large, macos-15-large, macos-14-xlarge, macos-15-xlarge]
        vtk: [ON, OFF]
    steps:
      - name: Clone
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Prepare
        run: |
          echo "SP_TIME=daily-$(date +''%y%m%d'')" >> $GITHUB_ENV
      - name: Compile
        run: |
          brew install glfw glew go libomp
          go build Checker/updater.go
          ./Script/mac-dependency.sh ${{ matrix.os }}
          mkdir build && cd build
          if [[ "${{ matrix.os }}" == "macos-15-large" || "${{ matrix.os }}" == "macos-15-xlarge" ]]; then
            export CC=$(brew --prefix llvm@18)/bin/clang
            export CXX=$(brew --prefix llvm@18)/bin/clang++
          else
            export CC=$(brew --prefix llvm@15)/bin/clang
            export CXX=$(brew --prefix llvm@15)/bin/clang++
          fi
          export FC=gfortran-13
          cmake \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_STANDARD_INCLUDE_DIRECTORIES=$(brew --prefix libomp)/include \
          -DCMAKE_CXX_STANDARD_INCLUDE_DIRECTORIES=$(brew --prefix libomp)/include \
          -DCMAKE_Fortran_STANDARD_INCLUDE_DIRECTORIES=$(brew --prefix libomp)/include \
          -DCMAKE_PREFIX_PATH="$(brew --prefix libomp);$(brew --prefix gcc@13)" \
          -DCMAKE_INSTALL_PREFIX=dist \
          -DSP_BUILD_PARALLEL=ON \
          -DSP_ENABLE_VTK=${{ matrix.vtk }} \
          -DVTK_PATH=/Users/runner/work/suanPan/suanPan/lib/cmake/vtk-9.5/ \
          ..
          cmake --build . --target install --config Release -j 3
          cd ..
          cp updater build/dist/bin
          ./Script/mac-patcher.sh build/dist
      - name: Cosign
        uses: sigstore/gh-action-sigstore-python@v3.0.1
        with:
          inputs: build/dist/bin/*
      - name: Pack
        run: |
          file_name="suanPan-${{ matrix.os }}-openblas"
          file_name="${file_name//xlarge/arm64}"
          file_name="${file_name//large/amd64}"
          [[ "${{ matrix.vtk }}" == "ON" ]] && file_name+="-vtk"
          [[ "${{ matrix.os }}" != *"xlarge"* ]] && file_name+="-avx"
          file_name+=".tar.gz"
          echo "ARTIFACT=$file_name" >> "$GITHUB_ENV"
          tar czf $file_name -C build/dist .
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}
      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.ARTIFACT }}
          asset_name: ${{ env.ARTIFACT }}
          tag: ${{ env.SP_TIME }}
          prerelease: true
          overwrite: true
          body: |
            This release is automatically generated by CI/CD pipelines.
  windows-master:
    runs-on: windows-2022
    timeout-minutes: 120
    strategy:
      matrix:
        avx: [ON, OFF]
        vtk: [ON, OFF]
        mkl: [ON, OFF]
    steps:
      - name: Clone
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Golang
        uses: actions/setup-go@v6
        with:
          cache: false
      - name: Prepare
        run: |
          echo ("SP_TIME=daily-"+(get-date -format "yyMMdd")) >> $env:GITHUB_ENV
      - name: MKL
        shell: cmd
        if: matrix.mkl == 'ON'
        run: |
          C:/msys64/usr/bin/wget.exe -q https://registrationcenter-download.intel.com/akdlm/IRC_NAS/a665fc26-bdf1-415f-9fc4-345f257f4fb1/w_onemkl_p_2024.2.1.106_offline.exe
          C:/msys64/usr/bin/wget.exe -q https://registrationcenter-download.intel.com/akdlm/IRC_NAS/ea23d696-a77f-4a4a-8996-20d02cdbc48f/w_fortran-compiler_p_2024.2.1.81_offline.exe
          w_onemkl_p_2024.2.1.106_offline.exe -s -a --silent --eula accept
          w_fortran-compiler_p_2024.2.1.81_offline.exe -s -a --silent --eula accept
      - name: VTK
        if: matrix.vtk == 'ON'
        run: |
          C:/msys64/usr/bin/wget.exe -q https://github.com/TLCFEM/prebuilds/releases/download/latest/VTK-9.5.2-win.7z
          7z x VTK-9.5.2-win.7z
      - name: Compile
        run: |
          go build Checker/updater.go
          mkdir build && cd build
          if (Test-Path "C:/Program Files (x86)/Intel/oneAPI/") {
            cmd.exe "/K" '"C:\Program Files (x86)\Intel\oneAPI\setvars.bat" && powershell'
          }
          cmake -T fortran=ifx `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_INSTALL_PREFIX=dist `
          -DSP_BUILD_PARALLEL=ON `
          -DSP_ENABLE_AVX2=${{ matrix.avx }} `
          -DSP_ENABLE_MKL=${{ matrix.mkl }} `
          -DSP_ENABLE_SHARED_MKL=OFF `
          -DSP_ENABLE_VTK=${{ matrix.vtk }} `
          -DVTK_PATH=D:/a/suanPan/suanPan/lib/cmake/vtk-9.5/ `
          ..
          cmake --build . --target install --config Release -j 4
          cp ../updater.exe dist/bin
      - name: Name
        shell: bash
        run: |
          file_name="suanPan-win"
          file_name+=$([[ "${{ matrix.mkl }}" == "ON" ]] && echo "-mkl" || echo "-openblas")
          [[ "${{ matrix.vtk }}" == "ON" ]] && file_name+="-vtk"
          [[ "${{ matrix.avx }}" == "OFF" ]] && file_name+="-no-avx"
          file_name+=".zip"
          echo "ARTIFACT=$file_name" >> "$GITHUB_ENV"
      - name: Pack
        shell: bash
        run: |
          cd build/dist/bin
          7z a -tzip ../../../${{ env.ARTIFACT }} ./*
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}
      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.ARTIFACT }}
          asset_name: ${{ env.ARTIFACT }}
          tag: ${{ env.SP_TIME }}
          prerelease: true
          overwrite: true
          body: |
            This release is automatically generated by CI/CD pipelines.
      - name: CHOCO
        if: matrix.mkl == 'ON' && matrix.vtk == 'ON' && matrix.avx == 'ON'
        shell: bash
        run: |
          python Enhancement/suanPan.py build/dist/bin
          ls -halt
          if [ "${{ github.event_name }}" == "push" ]; then
            choco apikey --key ${{ secrets.CHOCO_KEY }} --source https://push.chocolatey.org/
            choco push suanpan.3.9.3.nupkg --source https://push.chocolatey.org/
          fi
      - name: Release SHA256
        if: matrix.mkl == 'ON' && matrix.vtk == 'ON' && matrix.avx == 'ON'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: suanPan-win-mkl-vtk.sha256
          asset_name: suanPan-win-mkl-vtk.sha256
          tag: ${{ env.SP_TIME }}
          prerelease: true
          overwrite: true
          body: |
            This release is automatically generated by CI/CD pipelines.
      - name: Release NUPKG
        if: matrix.mkl == 'ON' && matrix.vtk == 'ON' && matrix.avx == 'ON'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: suanpan.3.9.3.nupkg
          asset_name: suanpan.3.9.3.nupkg
          tag: ${{ env.SP_TIME }}
          prerelease: true
          overwrite: true
          body: |
            This release is automatically generated by CI/CD pipelines.
  windows-gcc-master:
    runs-on: windows-2022
    timeout-minutes: 120
    strategy:
      matrix:
        avx: [ON, OFF]
        vtk: [ON, OFF]
    steps:
      - name: Clone
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Golang
        uses: actions/setup-go@v6
        with:
          cache: false
      - name: Prepare
        run: |
          echo ("SP_TIME=daily-"+(get-date -format "yyMMdd")) >> $env:GITHUB_ENV
          C:/msys64/usr/bin/wget.exe -q https://github.com/brechtsanders/winlibs_mingw/releases/download/13.3.0posix-11.0.1-ucrt-r1/winlibs-x86_64-posix-seh-gcc-13.3.0-mingw-w64ucrt-11.0.1-r1.7z
          7z x winlibs-x86_64-posix-seh-gcc-13.3.0-mingw-w64ucrt-11.0.1-r1.7z
      - name: VTK
        if: matrix.vtk == 'ON'
        run: |
          C:/msys64/usr/bin/wget.exe -q https://github.com/TLCFEM/prebuilds/releases/download/latest/VTK-9.5.2-win-gcc.7z
          7z x VTK-9.5.2-win-gcc.7z -oVTK
      - name: Compile
        run: |
          go build Checker/updater.go
          mkdir build && cd build
          cmake -G "MinGW Makefiles" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_C_COMPILER=D:/a/suanPan/suanPan/mingw64/bin/gcc.exe `
          -DCMAKE_CXX_COMPILER=D:/a/suanPan/suanPan/mingw64/bin/g++.exe `
          -DCMAKE_Fortran_COMPILER=D:/a/suanPan/suanPan/mingw64/bin/gfortran.exe `
          -DCMAKE_INSTALL_PREFIX=dist `
          -DSP_BUILD_PARALLEL=ON `
          -DSP_ENABLE_AVX2=${{ matrix.avx }} `
          -DSP_ENABLE_VTK=${{ matrix.vtk }} `
          -DVTK_PATH=D:/a/suanPan/suanPan/VTK/lib/cmake/vtk-9.5 `
          ..
          cmake --build . --target install --config Release -j 4
          cp ../updater.exe dist/bin
      - name: Name
        shell: bash
        run: |
          file_name="suanPan-win-gcc-openblas"
          [[ "${{ matrix.vtk }}" == "ON" ]] && file_name+="-vtk"
          [[ "${{ matrix.avx }}" == "OFF" ]] && file_name+="-no-avx"
          file_name+=".zip"
          echo "ARTIFACT=$file_name" >> "$GITHUB_ENV"
      - name: Pack
        shell: bash
        run: |
          cd build/dist/bin
          7z a -tzip ../../../${{ env.ARTIFACT }} ./*
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}
      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.ARTIFACT }}
          asset_name: ${{ env.ARTIFACT }}
          tag: ${{ env.SP_TIME }}
          prerelease: true
          overwrite: true
          body: |
            This release is automatically generated by CI/CD pipelines.
  virustotal-scan:
    runs-on: ubuntu-22.04
    needs:
      [
        linux-master,
        linux-master-mpi,
        macos-master,
        windows-master,
        windows-gcc-master,
      ]
    steps:
      - name: VirusTotal
        uses: cssnr/virustotal-action@v1
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_KEY }}
          release_id: ${{ env.SP_TIME }}
          release_heading: "### 🛡️ VirusTotal Results"
